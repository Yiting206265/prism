  <line x1="66" y1="55" x2="94" y2="42" stroke="#e87c3a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="67" y1="59" x2="94" y2="52" stroke="#efc84a" stroke-width="2.5" stroke-linecap="round"/>
